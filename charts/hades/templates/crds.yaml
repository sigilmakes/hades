apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hands.hades.dev
spec:
  group: hades.dev
  scope: Namespaced
  names:
    plural: hands
    singular: hands
    kind: Hands
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:
                agentRef: { type: string }
                homeRef: { type: string }
                image: { type: string }
                handsImageRef: { type: string }
                security:
                  type: object
                  properties:
                    runAsUser: { type: number }
                    fsGroup: { type: number }
                    # Run in a user namespace: pod-internal uid 0 maps to an
                    # unprivileged host uid (rootless hands — no node privilege).
                    userNamespace: { type: boolean }
            status:
              type: object
              properties:
                phase: { type: string }
                podName: { type: string }
---
