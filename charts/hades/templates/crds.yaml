apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: approvals.hades.dev
spec:
  group: hades.dev
  scope: Namespaced
  names:
    plural: approvals
    singular: approval
    kind: Approval
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [requestedBy, action]
              properties:
                requestedBy: { type: string }
                action: { type: string }
                reason: { type: string }
                resource: { type: string }
                expiresIn: { type: string }
            status:
              type: object
              properties:
                phase: { type: string, enum: [requested, approved, denied, expired] }
                createdAt: { type: string }
                decidedBy: { type: string }
                decidedAt: { type: string }
                note: { type: string }
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: capabilitygrants.hades.dev
spec:
  group: hades.dev
  scope: Namespaced
  names:
    plural: capabilitygrants
    singular: capabilitygrant
    kind: CapabilityGrant
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [subject, capabilities]
              properties:
                subject:
                  type: object
                  required: [kind, name]
                  properties:
                    kind: { type: string, enum: [Agent] }
                    name: { type: string }
                capabilities:
                  type: array
                  items: { type: string }
                constraints:
                  type: object
                  properties:
                    namespace: { type: string, enum: [own] }
                    systemGrant: { type: boolean }
                    maxChildDepth: { type: number }
            status:
              type: object
              properties:
                phase: { type: string }
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: connectors.hades.dev
spec:
  group: hades.dev
  scope: Namespaced
  names:
    plural: connectors
    singular: connector
    kind: Connector
    shortNames: [conn]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [agentRef, endpoint]
              properties:
                agentRef: { type: string }
                # The deployed userland endpoint the brain calls over HTTP.
                # The kernel routes + governs; it never interprets the body.
                endpoint: { type: string }
                # Auth material injected as headers from a Secret.
                secretRef: { type: string }
                # The egress profile this connector is granted (governance).
                egress: { type: string, enum: [restricted-web, none] }
            status:
              type: object
              properties:
                phase: { type: string }
                reachable: { type: boolean }
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: handsimages.hades.dev
spec:
  group: hades.dev
  scope: Namespaced
  names:
    plural: handsimages
    singular: handsimage
    kind: HandsImage
    shortNames: [himg]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [packages]
              properties:
                # The Nix packages the agent wants in its hands pod.
                packages:
                  type: array
                  items: { type: string }
                # The userland builder image that materializes the declaration.
                builderImage: { type: string }
            status:
              type: object
              properties:
                phase: { type: string }
                tag: { type: string }
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: skills.hades.dev
spec:
  group: hades.dev
  scope: Namespaced
  names:
    plural: skills
    singular: skill
    kind: Skill
    shortNames: [skl]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [agentRef]
              properties:
                agentRef: { type: string }
                # The port the agent's brain pod serves the capability on.
                port: { type: number }
                # A sub-path the capability is rooted at.
                path: { type: string }
                # A human description of what this skill does.
                description: { type: string }
            status:
              type: object
              properties:
                phase: { type: string }
                endpoint: { type: string }
