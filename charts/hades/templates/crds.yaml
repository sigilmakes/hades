# Hades custom resource definitions.
# Each CRD carries a validated openAPIV3Schema — kubectl apply rejects malformed
# resources before they reach the controller.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.hades.dev
spec:
  group: hades.dev
  scope: Namespaced
  names:
    plural: agents
    singular: agent
    kind: Agent
    shortNames: [ag]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:
                displayName: { type: string }
                classRef: { type: string }
                homeRef: { type: string }
                defaultSession: { type: string }
                desiredState: { type: string, enum: [active, inactive] }
                lifecycle: { type: string, enum: [resident, ephemeral] }
                systemAgent: { type: boolean }
                brain:
                  type: object
                  properties:
                    mode: { type: string, enum: [pi-sdk, test] }
                    image: { type: string }
                    secretRef: { type: string }
            status:
              type: object
              properties:
                phase: { type: string }
                brainPod: { type: string }
                session: { type: string }
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentclasses.hades.dev
spec:
  group: hades.dev
  scope: Namespaced
  names:
    plural: agentclasses
    singular: agentclass
    kind: AgentClass
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:
                brainImage: { type: string }
                allowedTools:
                  type: array
                  items: { type: string }
                defaultHandsPolicy: { type: string }
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: homes.hades.dev
spec:
  group: hades.dev
  scope: Namespaced
  names:
    plural: homes
    singular: home
    kind: Home
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:
                size: { type: string }
                layout:
                  type: object
                  properties:
                    create:
                      type: array
                      items: { type: string }
                files:
                  type: array
                  items:
                    type: object
                    required: [path]
                    properties:
                      path: { type: string }
                      content: { type: string }
                      mode: { type: number }
            status:
              type: object
              properties:
                phase: { type: string }
                pvc: { type: string }
---
