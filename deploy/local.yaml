apiVersion: v1
kind: Namespace
metadata:
  name: hades-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: hades-system
  name: hades-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hades-api
  template:
    metadata:
      labels:
        app: hades-api
    spec:
      containers:
        - name: hades-api
          image: ghcr.io/hades-dev/hades:dev
          command: ["node", "dist/cli.js", "serve", "7347"]
          ports:
            - containerPort: 7347
          env:
            - name: HADES_DATA_DIR
              value: /var/lib/hades
          volumeMounts:
            - name: data
              mountPath: /var/lib/hades
      volumes:
        - name: data
          # Single-node dev. For multi-node, swap this PVC to a shared
          # StorageClass (longhorn/nfs/cephfs) — see deploy/README.md.
          persistentVolumeClaim:
            claimName: hades-data
